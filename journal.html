{title:'孕期护肤安全清单：这些成分必须避开（含权威分级）',tag:'Wellness',emoji:'🤰',content:`<p><strong>孕期护肤安全第一原则：经皮吸收进入血液循环的成分量虽少，但胎儿敏感期（第5-10周）仍需谨慎。</strong>以下成分明确建议避免：维A酸类（Tretinoin、Isotretinoin、高浓度Retinol）——口服维A酸有明确的致畸性（FDA妊娠分级X级），外用虽吸收率低但多数医生建议孕期停用。另有研究表明外用维A酸的血药浓度极低（约2%），但许多国家药品监管机构仍建议避免（Sautour et al., 2012, Dermatologic Therapy）。</p><p><strong>相对安全且推荐的孕期护肤成分包括：</strong>壬二酸（Azelaic Acid，FDA妊娠分级B级，可安全治疗孕斑和痤疮）、维生素C（左旋C，浓度建议不超过20%）、玻尿酸、神经酰胺、烟酰胺（研究表明孕早期使用安全）。氢醌（Hydroquinone）在孕期应避免使用，但可考虑用壬二酸或曲酸替代。化学防晒剂如氧苯酮（Oxybenzone）存在争议，建议孕期使用氧化锌/二氧化钛物理防晒。</p>`},
{title:'男士护肤：从零开始的科学护肤流程，摆脱剃须困扰',tag:'Routine',emoji:'🧔',content:`<p><strong>男士皮肤与女性的主要差异：角质层更厚（约25%）、皮脂分泌更旺盛（雄激素刺激皮脂腺）、且常年受剃须刺激。</strong>据《皮肤病学杂志》2018年的一项研究，男性面部经皮水分流失（TEWL）比女性低约12%，但剃须后即刻TEWL升高达3倍。这意味着男士护肤的核心需求是：温和清洁、剃须护理和简化抗衰老。</p><p><strong>男士基础三步流程可以这样安排：</strong>第一步，温和洁面（避免皂基，选择氨基酸或APG葡萄糖苷洁面）；第二步，须前准备——用温水软化胡须，建议使用专业须前油减少刀片摩擦；第三步，保湿+防晒——质地轻薄的无油乳液配合SPF30+的防晒霜。多项研究表明男性皮肤对防晒的依从性仅为女性的三分之一，但男性皮肤癌发病率更高，防晒是男士护肤中最不可忽视的一步（American Academy of Dermatology, 2020）。</p>`},
{title:'儿童护肤：新生儿到青春期的科学护肤指南',tag:'Wellness',emoji:'👶',content:`<p><strong>新生儿的皮肤屏障在出生后第一年才逐步发育成熟，角质层比成人薄30%，pH值呈中性（约6.5-7.0）。</strong>这使得婴幼儿皮肤更容易失水和受刺激。欧洲儿科皮肤病学会（ESPD）建议：新生儿期（出生后第一个月）只需清水沐浴和温和的润肤剂；过度使用清洁产品可能破坏正在建立的皮肤微生态。一项针对400名新生儿的RCT研究显示，每日使用无香精润肤霜的婴儿组，特应性皮炎发病率降低约30%（Simpson et al., 2014, Journal of Allergy and Clinical Immunology）。</p><p><strong>儿童防晒同样不可忽视：6个月以下婴儿应避免直接日晒，以物理遮挡为主。</strong>6个月以上儿童应使用SPF30+的物理防晒霜（氧化锌/二氧化钛），因为化学防晒成分如阿伏苯宗（Avobenzone）在儿童体内的吸收率更高（EPA 2022年研究指出儿童对防晒剂的系统吸收约为成人的2-3倍）。青春期前后，若出现轻度痤疮可引入含2%水杨酸的洁面或低浓度烟酰胺护理，但视黄醇类建议留到16岁以后。</p>`},
{title:'防晒补涂全攻略：多久补一次？怎么补才有效？',tag:'Routine',emoji:'☀️',content:`<p><strong>防晒霜不是涂一次管一天——光防护剂的化学降解和物理磨损决定了必须补涂。</strong>FDA规定SPF值的测试基于每平方厘米2毫克的用量，以每平方厘米200毫克的标准均匀涂抹。日常使用中大多数人只用了推荐量的25-50%，实际SPF值可能只有标注值的四分之一。此外，出汗、擦拭、摩擦都会减少防晒膜的有效性。一份2020年的研究显示，在办公室环境中（无直接日照）8小时后防晒霜的残留保护力约为初始的55%。</p><p><strong>通用补涂原则：户外活动每2小时补涂一次；游泳或大量出汗后立即补涂；室内办公人群建议上午涂抹一次，午休后补涂一次。</strong>带妆补涂可以使用防晒粉饼、防晒喷雾或防晒散粉——注意喷雾需足够量（以皮肤可见湿润为宜）并用手抹匀。一项2023年消费者调查报告显示，约72%的人不知道防晒需要补涂，这也是防晒失败最常见的原因。</p>`},
{title:'蓝光对皮肤的伤害：屏幕光真的会让你变老吗？',tag:'Science',emoji:'💻',content:`<p><strong>蓝光（High Energy Visible Light, HEV）波长在400-490纳米，具有比UVA/UVB更长的穿透深度，可达真皮层。</strong>体外研究表明，蓝光照射可诱导角质形成细胞和成纤维细胞产生活性氧（ROS），刺激基质金属蛋白酶（MMP）表达，导致胶原蛋白降解（Liebel et al., 2012, Journal of Investigative Dermatology）。但需要澄清的是：实验室使用的蓝光剂量远高于日常屏幕暴露量。太阳光中的蓝光强度比屏幕高出100倍以上，户外蓝光暴露才是主要风险源。</p><p><strong>那么，需要为屏幕蓝光焦虑吗？目前的共识是：日常办公屏幕的蓝光剂量不足以造成显著的光老化。</strong>不过对于有黄褐斑或色素沉着问题的人群，可见光（含蓝光）确实可能加重色素沉着。氧化铁（Iron Oxides）是有效的可见光阻断剂，这就是为何含色素的粉底（而非纯物理防晒）对色素沉着人群更有保护意义。抗氧化剂（如维生素C、维生素E、阿魏酸）也能帮助中和蓝光诱导的自由基损伤。</p>`},
{title:'神经酰胺：皮肤屏障修复的核心成分，选对类型才有效',tag:'Ingredients',emoji:'🧱',content:`<p><strong>神经酰胺（Ceramides）是角质层细胞间脂质中占比最高的成分，约占脂质总量的40-50%。</strong>皮肤屏障的「砖浆模型」中，角质形成细胞是砖块，而神经酰胺、胆固醇和游离脂肪酸组成的脂质层就是连接砖块的水泥。目前已发现皮肤中至少有12种不同类型的神经酰胺，其中神经酰胺NP、NS、EOS对屏障功能最为关键。特应性皮炎患者的皮肤中神经酰胺总量显著降低（约减少30-50%），这也是皮肤屏障受损的核心原因之一（Imokawa et al., 1991, Journal of Investigative Dermatology）。</p><p><strong>选择含神经酰胺的护肤品时，注意两个要点：</strong>第一，配方中应同时含胆固醇和脂肪酸，三者以特定摩尔比（通常是3:1:1:1的神经酰胺：胆固醇：游离脂肪酸比例，MLE配方技术）才能重构有序的层状结构；第二，注意产品包装应为密封包装，神经酰胺易氧化降解。含神经酰胺的产品尤其适合干性皮肤、敏感肌和屏障受损人群，持续使用4周以上可显著改善皮肤屏障功能。</p>`},
{title:'益生菌护肤：皮肤微生态的科学与营销真相',tag:'Science',emoji:'🦠',content:`<p><strong>人类皮肤表面栖息着约1000种不同的微生物，总数量超过10亿个/平方厘米，构成复杂的皮肤微生态系统。</strong>这个生态系统包括细菌、真菌和病毒，健康状态下的微生态以葡萄球菌属和棒状杆菌属为优势菌群。微生态失衡（Dysbiosis）与痤疮、特应性皮炎、银屑病等多种皮肤病密切相关。2022年《自然综述：微生物学》的一篇综述指出，皮肤的微生物多样性越高，皮肤屏障功能越稳定。</p><p><strong>益生菌护肤品包含三种形式：益生菌（Probiotics，活菌）、益生元（Prebiotics，喂养有益菌的营养物）和后生元（Postbiotics，细菌代谢产物）。</strong>活菌添加到护肤品中面临保质期和稳定性难题，因此市面上大多数益生菌护肤品实际上使用的是经热灭活的裂解液（Lysate）或发酵滤液。研究证据最充分的是乳酸杆菌发酵产物，它能促进抗菌肽（AMPs）的产生并调节皮肤免疫反应。选购时注意区分：标有「发酵滤液」的是后生元产品，稳定性更好；标有「活菌」的产品通常需要特殊冷链保存。</p>`},
{title:'烟酰胺：万能护肤成分的六大功效与科学用量',tag:'Ingredients',emoji:'✨',content:`<p><strong>烟酰胺（Niacinamide），即维生素B3的酰胺形式，是护肤界公认的多功能成分。</strong>其作用机制涉及多个细胞通路：抑制黑素小体向角质形成细胞的转运（美白）、促进神经酰胺合成（屏障修复）、抑制皮脂腺分泌（控油）、以及提升NADPH水平增强细胞能量代谢。一项双盲RCT研究显示，2%烟酰胺在12周内可显著减少皮脂分泌率和毛孔可见度（Draelos et al., 2005, Journal of Cosmetic Dermatology）。</p><p><strong>浓度建议：2-5%适合敏感肌和初次使用者，5%是研究数据最充分的有效浓度，10%以上可能引起刺痛但美白效果更强。</strong>2019年一项研究比较了2%、5%和10%烟酰胺的美白效果，发现5%和10%组在8周后色素沉着改善无显著差异，但10%组皮肤刺痛感显著增加。温和百搭是烟酰胺最大的优势——它几乎可以与所有其他活性成分（维生素C、视黄醇、酸类）搭配使用，但维生素C和烟酰胺同时使用时建议间隔pH值差异（维生素C需低pH，烟酰胺在pH 5-7最稳定）。</p>`},
{title:'新手入门精华液选购指南：第一瓶精华怎么选不出错？',tag:'Routine',emoji:'🧪',content:`<p><strong>精华液是护肤品中活性成分浓度最高的品类，对于护肤新手，选对第一瓶精华至关重要。</strong>常见的精华液基底包括：水基底（适合所有肤质）、油基底（适合干性）和硅基底（适合油性，肤感丝滑）。新手最容易犯的错误是一开始就追求高浓度活性成分导致屏障受损。建议遵循「单成分入门，低浓度打底」的原则——先选一种核心成分，从低浓度开始，持续使用2-3个月评估效果。</p><p><strong>按肤质推荐第一瓶精华：</strong>干性皮肤——含玻尿酸（Hyaluronic Acid）+神经酰胺的保湿精华；油性/痘肌——2-5%烟酰胺精华，控油且温和；暗沉/色素不均——10-15%左旋维生素C（L-Ascorbic Acid，注意pH<3.5的配方）；敏感肌——含积雪草苷（Centella Asiatica）或泛醇（Panthenol）的修护精华。研究显示，坚持单一活性成分精华护理8周后的改善率比随意搭配多种精华高出约40%（King et al., 2021, Journal of Drugs in Dermatology）。建议新手先不要尝试精华叠加，等建立皮肤耐受后再逐步增加。</p>`},
{title:'按肤质选面霜：干皮、油皮、混皮的精准保湿策略',tag:'Routine',emoji:'🧴',content:`<p><strong>面霜的本质是「油+水+乳化剂」的体系，不同肤质需要的油水比例完全不同。</strong>干性皮肤缺乏皮脂腺分泌的天然油脂，经皮水分流失（TEWL）较高，需要含丰富封闭剂（Occlusives）的面霜——如凡士林（Petrolatum）、羊毛脂、角鲨烷、乳木果油等。理想的面霜应提供至少12小时的持续保湿。一项针对干性皮肤的研究表明，含5%乳木果油的面霜在单次涂抹后8小时内TEWL降低约34%（Fluhr et al., 2008, Journal of the European Academy of Dermatology）。</p><p><strong>油性/混合性皮肤则适合以吸湿剂（Humectants）和轻质润肤剂为主的乳液或凝胶霜。</strong>成分表前端标注「Water」「Glycerin」「Dimethicone」「Niacinamide」的面霜通常质地更轻薄。混合肌可以采用「分区护理法」：面部T区使用较清爽的凝胶或乳液，U区（两颊）使用质感稍丰润的乳霜。注意避开含高浓度植物油（如可可脂、椰子油）的面霜，其致痘性较高。无论何种肤质，防晒型日霜（含SPF30+）都是理想的日用选择。</p>`},
{title:'眼霜智商税？到底几岁开始用、怎么选才有用？',tag:'Routine',emoji:'👁️',content:`<p><strong>眼部皮肤是全身最薄的皮肤之一，厚度仅约0.5毫米（面部皮肤的1/3-1/5），且皮下脂肪和皮脂腺极少。</strong>这意味着眼部更容易出现干燥、细纹和浮肿。眼霜与面霜的核心区别在于：眼霜配方经过眼科测试，刺激性更低；质地更轻盈且避免使用可能引起眼周刺激的成分（如高浓度香精、AHA酸等）。但科学上，面部保湿霜完全可以用于眼周，只要你不觉得刺激且成分安全。</p><p><strong>什么时候需要专门的眼霜？</strong>如果你有以下特定眼部困扰：持续性浮肿（选含咖啡因的眼霜，能收缩毛细血管并减少液体积聚）；色素型黑眼圈（选含维生素K、维生素C或烟酰胺的眼霜）；结构性干纹（选含玻尿酸、神经酰胺或胜肽的眼霜）。2022年一项比较眼霜与面部保湿霜的研究发现，在保湿和改善细纹方面两者没有显著差异（眼霜组的细纹减少12.5%，面部保湿霜组为11.8%）。结论：眼霜不是必需品，但针对特定眼部问题的功能性眼霜确实有应用价值。</p>`},
{title:'双重清洁法：为什么油性皮肤更需要「以油溶油」？',tag:'Routine',emoji:'💦',content:`<p><strong>双重清洁法（Double Cleansing）源自韩国护肤传统，第一步用油基洁面溶解彩妆和防晒，第二步用水基洁面清理表面污垢。</strong>科学原理遵循「相似相溶」——油溶性污垢（防晒剂、皮脂、彩妆中的蜡和酯类）只能用油性溶剂有效去除。单独使用水基洁面无法完全清除含成膜剂的防水防晒霜，残留的防晒剂可能导致闭口和皮肤刺激。一项2020年的研究使用皮肤镜评估清洁效果，发现双重清洁后皮肤表面残留物减少了约70%，显著优于单次清洁。</p><p><strong>最适合双重清洁的肤质其实是油性和混合性皮肤——表面多余皮脂被油基洁面溶解后，毛孔更干净。</strong>选择卸妆油或卸妆膏时注意：成分中的乳化剂质量决定使用体验。优质卸妆油遇水即乳化，洗后无残留膜感；劣质产品乳化不完全，反而可能堵塞毛孔。干性皮肤使用双重清洁时注意不要过度清洁——每天一次（晚间）足够，早晨仅用温水或清水即可。敏感肌应选择无香精、成分简洁的油基洁面（如纯矿物油或角鲨烷为基底的卸妆产品）。</p>`},
{title:'玻尿酸：补水保湿的黄金标准，大分子小分子到底怎么选？',tag:'Ingredients',emoji:'💧',content:`<p><strong>玻尿酸（Hyaluronic Acid, HA）是一种天然存在于人体细胞外基质的糖胺聚糖，一个HA分子可以结合自重1000倍的水分子。</strong>皮肤中约50%的玻尿酸存在于真皮层，负责维持皮肤的水合状态和容积。然而随着年龄增长，皮肤中HA的含量逐渐下降——研究发现30岁时皮肤HA含量约为婴儿期的65%，到60岁只剩约25%（Meyer & Stern, 1994, Journal of Investigative Dermatology）。这就是为什么补充外源HA对保持皮肤水润有科学意义。</p><p><strong>不同分子量的玻尿酸作用位置不同：</strong>大分子HA（>1000 kDa）在皮肤表面形成保湿膜，减少TEWL但无明显渗透；中分子HA（100-500 kDa）可到达表皮层，提供中层保湿；小分子HA（<50 kDa）能渗透更深，进入真皮浅层。目前多分子量复配的「HA复合物」效果最佳——在角质层、表皮和真皮三层同时发挥作用。使用含玻尿酸产品时，建议在面部微湿时涂抹并立即叠加保湿霜封闭，否则在高干燥环境中HA可能会倒吸皮肤水分（「反向保湿」现象）。</p>`}
];
const TAG_EMOJI = {"Science": "\ud83d\udd2c", "Ingredients": "\ud83e\uddea", "Routine": "\ud83d\udccb", "Conditions": "\ud83c\udfaf", "Wellness": "\ud83c\udf3f"};

function renderGrid(posts) {
  const grid = document.getElementById('blogGrid');
  if (posts.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="big">🔍</div><p>No articles match your search. Try a different filter!</p></div>';
    return;
  }
  const colors = ['#d4a574','#8b5e3c','#c49a6c','#e8c1a0','#b8855a'];
  let html = '';
  posts.forEach((p, i) => {
    const c = colors[i % colors.length];
    const plain = p.content.replace(/<[^>]*>/g, '').substring(0, 130);
    const idx = POSTS.indexOf(p);
    html += '<div class="blog-card" onclick="showArticle(' + idx + ')">'
      + '<div class="blog-card-img" style="background:linear-gradient(135deg,' + c + '22,' + c + '44)">' + p.emoji + '</div>'
      + '<div class="blog-card-body">'
      + '<span class="blog-tag">' + (TAG_EMOJI[p.tag] || '📌') + ' ' + p.tag + '</span>'
      + '<h3>' + p.title + '</h3>'
      + '<p class="card-clamp">' + plain + '…</p>'
      + '</div></div>';
  });
  grid.innerHTML = html;
}

function applyFilters() {
  const tag = document.getElementById('tagFilter').value;
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = POSTS;
  if (tag !== 'all') filtered = filtered.filter(p => p.tag === tag);
  if (query) filtered = filtered.filter(p =>
    p.title.toLowerCase().includes(query) ||
    p.content.toLowerCase().includes(query) ||
    p.tag.toLowerCase().includes(query)
  );
  renderGrid(filtered);
  document.getElementById('stats').textContent = filtered.length + ' article' + (filtered.length !== 1 ? 's' : '');
}

let currentIdx = -1;
function showArticle(idx) {
  currentIdx = idx;
  document.getElementById('blogGrid').style.display = 'none';
  const view = document.getElementById('articleView');
  view.classList.add('show');
  const p = POSTS[idx];
  document.getElementById('articleContent').innerHTML =
    '<span class="blog-tag">' + (TAG_EMOJI[p.tag] || '📌') + ' ' + p.tag + '</span>'
    + '<h2>' + p.emoji + ' ' + p.title + '</h2>'
    + '<div class="post-body">' + p.content + '</div>';
  window.scrollTo({ top: view.offsetTop - 70, behavior: 'smooth' });
}

function hideArticle() {
  document.getElementById('articleView').classList.remove('show');
  document.getElementById('blogGrid').style.display = 'grid';
  if (currentIdx >= 0) {
    const cards = document.querySelectorAll('.blog-card');
    if (cards[currentIdx]) cards[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}


// ── Generate Random Chinese Article ──
function generateArticle() {
  if (POSTS.length === 0) return;
  const idx = Math.floor(Math.random() * POSTS.length);
  const p = POSTS[idx];
  
  // Show the article right below the filters, above the grid
  const existing = document.getElementById('generatedArticle');
  if (existing) existing.remove();
  
  const div = document.createElement('div');
  div.id = 'generatedArticle';
  div.style.cssText = 'background:#fff;border:1px solid #eee;border-radius:18px;padding:28px;margin:12px 0 20px;';
  div.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    + '<span class="blog-tag">✨ 随机推荐</span>'
    + '<button onclick="this.parentElement.parentElement.remove()" style="background:none;border:1px solid #e0e0e0;border-radius:50px;padding:4px 12px;font-size:1.1rem;color:#86868b;cursor:pointer">✕ 关闭</button>'
    + '</div>'
    + '<span class="blog-tag">' + (TAG_EMOJI[p.tag] || '📌') + ' ' + p.tag + '</span>'
    + '<h2 style="font-size:1.6rem;font-weight:600;margin:10px 0 12px;">' + p.emoji + ' ' + p.title + '</h2>'
    + '<div class="post-body">' + p.content + '</div>';
  
  const grid = document.getElementById('blogGrid');
  grid.parentElement.insertBefore(div, grid);
  
  div.scrollIntoView({ behavior: 'smooth', block: 'start' });
  
  // Update stats
  document.getElementById('stats').textContent = POSTS.length + ' 篇文章';
}

renderGrid(POSTS);
</script>
</body>
</html>
