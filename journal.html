{title:'Pregnancy-Safe Skincare: What the Evidence Says About Risk and Safety',tag:'Conditions',emoji:'🤰',content:`<p><strong>Pregnancy is a period when the usual risk-benefit calculus for skincare ingredients shifts dramatically — because the risk is no longer just to you, but to fetal development — and several common active ingredients have well-documented evidence of teratogenicity or systemic absorption concerns.</strong> The most important ingredient to avoid is tretinoin and all prescription retinoids (oral isotretinoin is a known teratogen, and topical tretinoin carries a theoretical risk despite minimal systemic absorption — a 2018 review in <em>Dermatologic Therapy</em> identified 14 case reports of fetal malformations associated with topical retinoid use during pregnancy, though no causative link was definitively established). The US FDA classifies topical tretinoin as Pregnancy Category C (risk cannot be ruled out), and the European Medicines Agency advises avoidance during pregnancy. High-dose salicylic acid (above 2%) and chemical sunscreens containing oxybenzone, homosalate, and octinoxate are also cautioned against due to systemic absorption concerns documented in a 2020 JAMA study that found oxybenzone in 96% of urine samples from pregnant study participants.</p><p><strong>Safe alternatives during pregnancy are fortunately abundant and well-studied: azelaic acid (Pregnancy Category B) is the evidence-backed choice for managing acne and pigmentation, with a 2020 meta-analysis confirming no increased risk of adverse outcomes in over 1,200 first-trimester exposures.</strong> Glycolic acid and lactic acid at concentrations up to 10% are considered safe in topical leave-on products, as are vitamin C (L-ascorbic acid), niacinamide, and hyaluronic acid — all of which have strong safety records with negligible systemic absorption. For sun protection, mineral sunscreens with zinc oxide (non-nano grade) and titanium dioxide are the unequivocal recommendation of the American College of Obstetricians and Gynecologists (ACOG) and the American Academy of Dermatology, as they form a physical barrier on the skin rather than being absorbed systemically.</p><p><strong>A common question is about bakuchiol as a 'pregnancy-safe retinol alternative': while it does not activate retinoic acid receptors and has no known teratogenicity, there are no controlled human studies of bakuchiol use during pregnancy.</strong> The current consensus (American Academy of Dermatology, 2023 guidelines) is that bakuchiol is likely safe but cannot be definitively recommended due to the absence of pregnancy-specific data. Essential oils in high concentrations should also be approached cautiously — some, like clary sage and rosemary, have theoretical uterine-stimulant effects, though the concentrations in cosmetic products are generally considered safe. The safest approach: during the first trimester especially, stick to mineral sunscreen, gentle cleansers, barrier-supporting moisturizers, and evidence-safe actives (niacinamide, azelaic acid, vitamin C). Always consult your OB-GYN or dermatologist before introducing any new active ingredient during pregnancy or breastfeeding.</p>`},
{title:'Men's Skincare: Why Anatomy and Physiology Demand a Different Approach',tag:'Routine',emoji:'🪒',content:`<p><strong>Men's skin is not just 'thicker than women's' — it's structurally and physiologically distinct in ways that directly affect product efficacy and formulation needs.</strong> A 2014 review in <em>Skin Pharmacology and Physiology</em> summarizing over 20 years of sex-difference research found that male skin is approximately 15–25% thicker across all anatomical sites, primarily due to higher collagen density (men have ~20% more collagen in their dermis, with a slower age-related decline). Male skin also produces significantly more sebum — a 2018 sebumetry study of 500 participants found that men's sebum production is 2.5× higher than women's on the forehead and 3.0× higher on the nose — driven by androgen receptors in sebaceous glands. This higher sebum output means men have a naturally lower skin surface pH (about 4.8–5.2 versus 5.0–5.5 in women), which can actually be beneficial for antimicrobial defense but also requires different cleansing strategies to avoid over-stripping.</p><p><strong>The most significant skincare consideration for men is shaving — an activity that mechanically exfoliates, disrupts the skin barrier, and creates micro-trauma 5–6 times per week for most men.</strong> A 2021 study measuring TEWL before and after wet shaving found a 45–60% increase in water loss immediately post-shave, requiring 4–6 hours for barrier function to return to baseline. This makes pre-shave preparation and post-shave recovery critical skincare steps that have no parallel in women's routines. Effective pre-shave prep involves a pH-balanced cleanser (not bar soap, which raises pH to 8–9 and weakens the hair cuticle), followed by a hydrating pre-shave product or leaving the cleanser on for 60 seconds to maximize hair hydration (which reduces cutting force by 30–40% according to shaving research). Post-shave, the immediate application of a moisturizer with niacinamide (to reduce TEWL), aloe vera (to calm inflammation), and a low concentration of salicylic acid (0.5–1% to prevent ingrown hairs) is supported by clinical evidence.</p><p><strong>For anti-aging, men have a paradoxical advantage and disadvantage: they start with more collagen and lose it more slowly, but higher cumulative UV exposure (men spend more time outdoors without sunscreen, per a 2022 CDC survey where 62% of men reported never using sunscreen vs 37% of women) accelerates photoaging dramatically after age 50.</strong> The most impactful skincare habit for men is daily sunscreen use — a 2019 Australian study found that men who used SPF 30+ daily had 40% less visible photoaging over 4.5 years compared to irregular users. With the caveat that men's skin is more reactive to irritants due to higher density of sensory nerve fibers (per a capsaicin-based sensitivity assay), a men's skincare routine should focus on: a gentle pH-balanced cleanser, a lightweight water-based moisturizer, daily SPF 30+ sunscreen, and a retinoid at the lowest effective dose introduced gradually. The 'just use your partner's products' approach often fails because women's moisturizers tend to be richer and more emollient — which can feel greasy on oily male skin and potentially exacerbate breakouts.</p>`},
{title:'Children's Skincare: Why Less Is More — and What 'Safe' Actually Means',tag:'Routine',emoji:'👶',content:`<p><strong>Children's skin is not simply 'adult skin in a smaller package' — it is structurally and functionally immature, with a thinner stratum corneum (30–40% thinner than adult skin), weaker barrier function (50% higher TEWL in infants), and a less developed acid mantle that takes 2–4 years to reach adult pH levels.</strong> A 2020 review in the <em>Journal of the European Academy of Dermatology and Venereology</em> emphasized that these differences make children's skin more permeable to topical ingredients — both beneficial (moisturizers) and potentially harmful (irritants, allergens, endocrine disruptors). The surface-area-to-body-weight ratio in a toddler is approximately 2.5–3× that of an adult, meaning that any ingredient absorbed through the skin reaches much higher systemic concentrations relative to body weight. This is why regulatory bodies like the European Commission have issued specific safety guidelines for children's cosmetics, recommending against ingredients like hydroquinone, retinoids (at therapeutic concentrations), and certain chemical sunscreen filters (oxybenzone, octinoxate) in products for children under 3.</p><p><strong>For routine care, the evidence overwhelmingly supports a minimalist approach: warm water (not hot), a mild fragrance-free cleanser used only as needed (not daily unless visibly dirty), and a simple moisturizer with ingredients that support barrier development.</strong> A 2018 randomized controlled trial in <em>Pediatric Dermatology</em> found that daily full-body moisturization with a ceramide-containing lotion in infants from birth to 6 months reduced the cumulative incidence of atopic dermatitis by 33% compared to no moisturization in high-risk (family history of allergies) infants. The key ingredients to look for in children's products are ceramides, colloidal oatmeal, shea butter, glycerin, and panthenol — all of which have strong safety data and support barrier function. Fragrance should be strictly avoided; a 2021 retrospective analysis of pediatric contact dermatitis patch test data showed that fragrance mix I and II are among the top 5 allergens in children aged 6–12, with positive patch test rates of 8.2% and 5.4% respectively.</p><p><strong>The most critical non-negotiable in children's skincare is sun protection: the American Academy of Pediatrics recommends mineral sunscreens (zinc oxide or titanium dioxide) for all children over 6 months old, applied at SPF 30+, with the 'teaspoon rule' — a teaspoon of sunscreen to the face and neck, and a shot-glass-full for the full body.</strong> A landmark study tracking childhood sun exposure patterns found that 23% of lifetime UV exposure occurs before age 18, and that one severe sunburn in childhood doubles the lifetime risk of melanoma. For children under 6 months, sun avoidance (shade, protective clothing, wide-brimmed hats) is preferred over sunscreen use due to the immature skin barrier. When choosing children's skincare, the 'less is more' principle isn't minimalism for its own sake — it's evidence-based risk reduction grounded in the unique physiology of developing skin.</p>`},
{title:'Aging in Your 30s, 40s, and 50s: How Your Skin Changes and What Actually Works',tag:'Wellness',emoji:'🎂',content:`<p><strong>Skin aging is not a uniform, linear process — it proceeds through distinct phases driven by different biological mechanisms, and the interventions that work optimally in your 30s are different from those that matter most in your 50s.</strong> In your 30s, the dominant aging process is the onset of intrinsic aging: collagen production begins declining at about 1% per year starting around age 25–30, leading to the first visible fine lines (especially around the eyes and forehead). Elastin fiber networks start fragmenting, and the skin's extracellular matrix loses its organized structure. A 2019 study using confocal microscopy found that facial skin thickness decreases by approximately 6% between ages 30 and 40. The most evidence-backed interventions for this decade are: daily SPF 30+ sunscreen (the single most impactful anti-aging measure at any age, but starting early prevents 90% of future photoaging according to the 2013 'SU.VI.MAX' cohort study), a retinoid (0.3–0.5% retinol or 0.025% tretinoin), and vitamin C in the morning for antioxidant photoprotection.</p><p><strong>In your 40s, the aging curve steepens: collagen synthesis drops to about 65% of youthful levels by age 45, and menopause (typically around age 51) triggers a dramatic acceleration in skin aging due to estrogen decline.</strong> A seminal 2001 study in the <em>British Journal of Dermatology</em> found that skin collagen content decreases by 30% in the first 5 years post-menopause, after which the decline slows to about 2% per year. This is when deeper wrinkles, noticeable volume loss, and the first signs of sagging appear. The priority shifts from prevention to active repair: increase retinoid strength (0.5–1.0% retinol or 0.05% tretinoin) if tolerated, add peptides and growth factors that stimulate fibroblast activity, and consider incorporating a high-quality moisturizer with ingredients like ectoin, shea butter, and squalane to combat the increasing dryness that comes with declining sebum production (which drops 30–40% between ages 40 and 55, per a 2016 sebumetry study). Menopausal hormone therapy, applied topically under medical supervision, has been shown in European Dermatology Forum guidelines to significantly improve skin elasticity and hydration.</p><p><strong>In your 50s and beyond, the aging process plateaus at a lower baseline: collagen synthesis stabilizes at around 20–30% of youthful maximum, sebum production reaches its minimum, and the skin's capacity for wound healing and repair slows by approximately 40% compared to age 30.</strong> A 2022 longitudinal study of women aged 50–70 found that consistent use of a multi-active skincare approach — SPF 50, tretinoin 0.05%, vitamin C, and a ceramide-rich moisturizer — maintained skin firmness and hydration at levels comparable to age-matched controls who were 10 years younger. The focus at this stage is on barrier support, deep moisturization, and continued sun protection. The concept of 'skin aging reversal' at this age is misleading: while retinoids and lasers can improve the appearance of photoaged skin, they cannot fully restore lost collagen or elastin to youthful levels. The realistic goal is measurable improvement (20–30% reduction in wrinkle depth, 15–25% improvement in firmness over 6–12 months) and maintaining what you have. The most important message across all decades: it's never too late to start sunscreen. Even starting SPF 30+ daily at age 50 provides measurable anti-aging benefits within 6 months, as shown by dermoscopy and biopsy studies.</p>`},
{title:'Why Sunscreen Reapplication Matters More Than Your SPF Number',tag:'Routine',emoji:'☀️',content:`<p><strong>The SPF number on your sunscreen bottle measures protection under ideal lab conditions — 2 mg/cm² applied uniformly, no sweating, no water contact, no rubbing — and the gap between lab performance and real-world protection is vast, with reapplication being the single most critical factor determining your actual level of protection.</strong> A 2019 field study conducted on 80 beachgoers found that the average amount of sunscreen applied was 0.5–0.8 mg/cm² (25–40% of the recommended amount), which means the labeled SPF 50 was effectively providing SPF 8–12 protection after the first application. More alarmingly, after 80 minutes of combined sun exposure, swimming, and towel-drying, the average remaining protection was equivalent to just SPF 3–5. This exponential decay in protection occurs because sunscreen filters are physically removed (by sweating, swimming, clothing friction, and mechanical rubbing) and photodegraded (chemical filters break down when exposed to UV radiation). A 2020 study using UV photography demonstrated that 45–60% of sunscreen is removed within 2 hours of wear under normal daily conditions — even without swimming or heavy sweating.</p><p><strong>The '2-hour rule' for reapplication isn't arbitrary — it's based on the fact that chemical UV filters like avobenzone, octinoxate, and oxybenzone lose 30–60% of their photoprotective capacity within 2 hours of UV exposure due to photodegradation.</strong> A 2018 photostability study measured avobenzone concentration on human skin over 120 minutes of simulated sunlight: it dropped from the initial concentration to 38% at 60 minutes and 17% at 120 minutes. Mineral filters (zinc oxide and titanium dioxide) are photostable — they don't degrade — but they are still mechanically removed, so the same reapplication schedule applies. The critical threshold is cumulative UV exposure: 2 hours of total time in the sun, regardless of whether that's continuous or broken up. If you're working at a desk near a window (which transmits UVA, though not UVB — UVA penetrates glass), you don't need to reapply as frequently, but prolonged exposure through windows does contribute to photoaging over time.</p><p><strong>Practical reapplication strategies that improve compliance: use a powder sunscreen or sunscreen mist for easy reapplication over makeup (though these typically provide lower coverage than lotions, so apply extra), set a phone timer for 90 minutes to account for the fact that most people under-apply, and use the 'two-finger method' — squeeze sunscreen along the length of your pointer and middle fingers for the face and neck.</strong> For a full day outdoors, bring a sunscreen stick for the face (easier to reapply without mess) and a spray or lotion for the body. And forget the old myth that 'water-resistant' eliminates reapplication — water resistance is measured in a lab (40 or 80 minutes in a stirring bath), not at the beach. Even '80-minute water-resistant' sunscreen must be reapplied immediately after swimming or heavy sweating. The bottom line is stark but straightforward: the difference between SPF 50 and SPF 100 is about 1% in UVB blockage (98% vs 99%), but the difference between applying once and reapplying every 2 hours can be the difference between minimal cumulative UV damage and significant photoaging over a lifetime.</p>`},
{title:'Blue Light and Your Skin: Is Screen Time Actually Aging You?',tag:'Science',emoji:'💻',content:`<p><strong>High-energy visible (HEV) blue light — specifically the 400–450 nm wavelength range emitted by smartphone screens, computer monitors, LED lighting, and most significantly, the sun — has become a major topic in skincare, but the science reveals a more measured story than the marketing suggests.</strong> The sun emits approximately 10,000× more HEV light than a typical smartphone screen — a 2018 study in the <em>Journal of Biomedical Physics and Engineering</em> calculated that you'd need to hold a tablet 6 inches from your face for 8+ hours to receive the same blue light dose as 15 minutes in indirect sunlight. This doesn't mean blue light is harmless — it means the source matters enormously. Several in-vitro studies have shown that HEV light induces reactive oxygen species (ROS) in human skin fibroblasts, with a 2015 study demonstrating that 400–430 nm light at physiological doses generated 2.5× more ROS than UVA at equivalent energy doses. The same study found that blue light exposure upregulated matrix metalloproteinase-1 (MMP-1) — the primary collagenase responsible for photoaging — by 1.7-fold after 48 hours.</p><p><strong>The clinical evidence for blue light's effect on melanogenesis (pigment production) is actually stronger than for photoaging: a 2019 controlled trial in 30 subjects found that visible light (including blue wavelengths) induced more persistent pigmentation in Fitzpatrick skin types IV–VI than UVA alone, and that the pigmentation lasted 2–3 weeks compared to 5–7 days for UVA-induced pigmentation.</strong> This is mediated by a different pigmentary pathway — instead of the MC1R receptor that responds to UV, blue light activates opsin-3 receptors on melanocytes, triggering melanin production through a calcium-dependent signaling cascade. For individuals with melasma or darker skin tones, this has practical implications: visible light is thought to contribute to melasma persistence even when UV is fully blocked, which is why iron oxides (the pigment in tinted sunscreens) are increasingly recommended, as they physically block visible light while UV filters alone do not.</p><p><strong>So what should you actually do about blue light? The evidence-based approach is pragmatic: don't worry about your phone screen damaging your skin (the dose is too low), but do consider visible light protection if you have melasma, post-inflammatory hyperpigmentation, or medium-to-dark skin — and especially if you spend significant time outdoors in direct sunlight.</strong> Tinted sunscreens containing iron oxide (look for shades with 'peach', 'golden', or 'tan' tints that leave minimal white cast on deeper skin) are the most effective option, as iron oxide provides broad visible light protection that untinted mineral or chemical sunscreens don't. Antioxidants — particularly vitamin C, vitamin E, and ferulic acid — also help neutralize the ROS generated by blue light exposure, making them a good complementary strategy. As for blue-light-blocking glasses and 'blue light' skincare filters, the evidence for their necessity during normal indoor screen use remains thin. Prioritize UV protection first, use antioxidants second, and consider iron oxide-based tinted SPF if hyperpigmentation is your primary concern.</p>`},
{title:'Vitamin C Stability: Why Formulation Matters More Than Percentage',tag:'Science',emoji:'🍊',content:`<p><strong>L-ascorbic acid (LAA) — the pure, active form of vitamin C — is notoriously unstable: it oxidizes rapidly in the presence of oxygen, light, heat, and even the water content of the formulation itself, with degradation rates that can render a 15% serum completely ineffective within 2–4 weeks if not properly formulated.</strong> LAA oxidizes reversibly to dehydroascorbic acid (DHAA) and then irreversibly to 2,3-diketogulonic acid — the latter has no biological activity and can even be pro-oxidant under certain conditions. A 2017 stability study tracked 8 commercial vitamin C serums over 12 weeks and found that 50% lost over 40% of their LAA content within 4 weeks, with the fastest-degrading serum dropping from a claimed 20% LAA to 7.8% in just 14 days. The key variables determining stability are: formulation pH (LAA is most stable at pH 3.0–3.5 — above pH 4.0 it oxidizes 5–10× faster), water content (anhydrous or low-water formulations dramatically improve shelf life), packaging (airless pumps are superior to droppers, as oxygen exposure per use is 3–5× lower), and the presence of stabilizing antioxidants (ferulic acid at 0.5–1% can triple LAA's half-life by scavenging the free radicals that initiate the oxidation cascade).</p><p><strong>The gold standard for vitamin C stability is the 'CEFerulic' combination — 15% L-ascorbic acid + 1% vitamin E (alpha-tocopherol) + 0.5% ferulic acid, formulated at pH 3.2 — originally patented by Sheldon Pinnell's lab at Duke University and validated in a landmark 2005 study published in the <em>Journal of the American Academy of Dermatology</em>.</strong> This combination quadrupled the photoprotection SPF of sunscreen from 4.2 to 9.6 and extended the formulation's shelf life to 18+ months under refrigeration and 6+ months at room temperature. The mechanism is synergistic: ferulic acid stabilizes LAA by donating electrons to neutralize the semidehydroascorbyl radical (the oxidized intermediate of LAA), while vitamin E is regenerated by LAA in a redox cycle. For those who find LAA too irritating, stabilized derivatives like sodium ascorbyl phosphate (SAP) — which converts to LAA on the skin — offer a pH of 6.0–7.0 (far less stinging) but are approximately 10–20× less potent on a weight basis according to enzymology studies. Magnesium ascorbyl phosphate (MAP) and ascorbyl glucoside fall into a similar category; they're more stable and gentler but less clinically studied for anti-aging benefits compared to LAA.</p><p><strong>Practical rules for choosing a vitamin C serum: if it's L-ascorbic acid in a clear glass dropper bottle, you have approximately 4–6 weeks before significant degradation begins — store it in the refrigerator and look for signs of yellowing (a little yellow is acceptable, but deep amber or brown means it's degraded).</strong> Airless opaque pumps are the packaging of choice for stability. The concentration sweet spot is 10–20% LAA — lower than 8% has limited evidence for collagen stimulation, and higher than 20% offers no additional benefit with significantly more irritation. If a serum claims 15% LAA but lists 'water' first and doesn't include ferulic acid, vitamin E, or an airless pump, be skeptical — the percentage on the label reflects what went into the manufacturing tank, not what's still active when it reaches your skin. The most honest vitamin C labels would show a 'stability guarantee' window. Until then, your best indicators are packaging, formulation partners (ferulic + E), and your own sensory observation.</p>`},
{title:'Ceramides: The Molecular Foundation of a Healthy Skin Barrier',tag:'Ingredients',emoji:'🧱',content:`<p><strong>Ceramides are the most abundant lipid in the stratum corneum — comprising 40–50% of the intercellular lipid matrix — and they function as the 'mortar' between the brick-like corneocytes, forming the lamellar bilayer structure that is the physical basis of the skin barrier.</strong> Human skin contains at least 12 different ceramide subclasses (Ceramide NS, NP, EOS, EOP being the most abundant), each consisting of a sphingoid base linked to a fatty acid via an amide bond. This molecular architecture is critical: the long-chain fatty acids (C16–C26) interdigitate between opposing bilayers, creating a dense, impermeable membrane that prevents water loss and blocks microbial entry. A 2019 lipidomics study using mass spectrometry found that atopic dermatitis patients have a 30–50% reduction in total ceramide content in the stratum corneum compared to healthy skin, along with an altered ceramide composition — specifically, lower levels of Ceramide NP and a shorter average fatty acid chain length. This directly correlates with a 60–80% increase in TEWL measurements and explains the 'leaky barrier' pathophysiology of eczema.</p><p><strong>The clinical evidence for topical ceramide supplementation is compelling: a 2021 meta-analysis of 12 randomized controlled trials including 1,402 participants found that ceramide-containing moisturizers improved TEWL by an average of 25% and increased skin hydration by 34% compared to vehicle controls after 4–8 weeks of use.</strong> The most effective formulations use ceramides in a 3:1:1:1 ratio of ceramides, cholesterol, and free fatty acids — a 'physiological lipid mixture' that mimics the natural composition of the stratum corneum. A seminal 1996 study by Dr. Peter Elias's lab at UCSF demonstrated that only the full triple-lipid mixture (ceramide + cholesterol + fatty acid) normalizes barrier function in essential fat const TAG_EMOJI = {"Science": "\ud83d\udd2c", "Ingredients": "\ud83e\uddea", "Routine": "\ud83d\udccb", "Conditions": "\ud83c\udfaf", "Wellness": "\ud83c\udf3f"};

function renderGrid(posts) {
  const grid = document.getElementById('blogGrid');
  if (posts.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="big">🔍</div><p>No articles match your search. Try a different filter!</p></div>';
    return;
  }
  const colors = ['#d4a574','#8b5e3c','#c49a6c','#e8c1a0','#b8855a'];
  let html = '';
  posts.forEach((p, i) => {
    const c = colors[i % colors.length];
    const plain = p.content.replace(/<[^>]*>/g, '').substring(0, 130);
    const idx = POSTS.indexOf(p);
    html += '<div class="blog-card" onclick="showArticle(' + idx + ')">'
      + '<div class="blog-card-img" style="background:linear-gradient(135deg,' + c + '22,' + c + '44)">' + p.emoji + '</div>'
      + '<div class="blog-card-body">'
      + '<span class="blog-tag">' + (TAG_EMOJI[p.tag] || '📌') + ' ' + p.tag + '</span>'
      + '<h3>' + p.title + '</h3>'
      + '<p class="card-clamp">' + plain + '…</p>'
      + '</div></div>';
  });
  grid.innerHTML = html;
}

function applyFilters() {
  const tag = document.getElementById('tagFilter').value;
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = POSTS;
  if (tag !== 'all') filtered = filtered.filter(p => p.tag === tag);
  if (query) filtered = filtered.filter(p =>
    p.title.toLowerCase().includes(query) ||
    p.content.toLowerCase().includes(query) ||
    p.tag.toLowerCase().includes(query)
  );
  renderGrid(filtered);
  document.getElementById('stats').textContent = filtered.length + ' article' + (filtered.length !== 1 ? 's' : '');
}

let currentIdx = -1;
function showArticle(idx) {
  currentIdx = idx;
  document.getElementById('blogGrid').style.display = 'none';
  const view = document.getElementById('articleView');
  view.classList.add('show');
  const p = POSTS[idx];
  document.getElementById('articleContent').innerHTML =
    '<span class="blog-tag">' + (TAG_EMOJI[p.tag] || '📌') + ' ' + p.tag + '</span>'
    + '<h2>' + p.emoji + ' ' + p.title + '</h2>'
    + '<div class="post-body">' + p.content + '</div>';
  window.scrollTo({ top: view.offsetTop - 70, behavior: 'smooth' });
}

function hideArticle() {
  document.getElementById('articleView').classList.remove('show');
  document.getElementById('blogGrid').style.display = 'grid';
  if (currentIdx >= 0) {
    const cards = document.querySelectorAll('.blog-card');
    if (cards[currentIdx]) cards[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

    `<p><strong>Let's cut through the marketing noise and look at what ${a} actually does for ${b.toLowerCase()}.</strong> The mechanism of action, the research evidence, and the practical application — all in one place.</p>`,

  const bodies = [

renderGrid(POSTS);
